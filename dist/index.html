    <script>
      // 主题预加载：兼容 JSON 编码（"light"）和纯字符串（light）两种存储格式
      try {
        var raw = localStorage.getItem('weblinux-theme');
        if (raw) {
          var theme = raw;
          try { theme = JSON.parse(raw); } catch (e) {}
          if (theme === 'light') {
            document.documentElement.classList.add('light');
          }
        }
      } catch (e) {}
    </script>

    <script>
      // 启动日志动画
      (function() {
        var lines = [
          { type: 'info', text: '[ OK ] Started WebLinuxOS init process' },
          { type: 'info', text: '[ OK ] Reached target Multi-User System' },
          { type: 'info', text: '[ OK ] Listening on virtual desktop 0.0.0.0:5173' },
          { type: 'ok',   text: '[ OK ] Loaded 200+ integrated applications' },
          { type: 'ok',   text: '[ OK ] Mounted virtual file system' },
          { type: 'ok',   text: '[ OK ] Pyodide runtime ready' },
          { type: 'warn', text: '[INFO] Tailwind-free design system initialized' },
          { type: 'info', text: '[ OK ] WebLinuxOS v44 ready · 200+ apps loaded' },
        ];
        var el = document.getElementById('boot-log');
        if (!el) return;
        var delay = 0;
        lines.forEach(function(l, i) {
          delay += 220;
          setTimeout(function() {
            var span = document.createElement('div');
            span.className = 'line ' + l.type;
            span.textContent = l.text;
            el.appendChild(span);
            if (el.children.length > 6) el.removeChild(el.children[0]);
          }, delay);
        });
      })();
    </script>
