name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-linux/package-lock.json

      - name: Install dependencies
        working-directory: ./web-linux
        run: npm ci

      - name: Build (GitHub Pages mode)
        working-directory: ./web-linux
        run: npm run deploy

      - name: Verify build output
        run: |
          echo "--- Root directory listing (first-pass) ---"
          ls -la ./
          echo "--- Checking index.html exists ---"
          test -f ./index.html && echo "OK: index.html exists" || (echo "FAIL: index.html missing" && exit 1)
          echo "--- Checking assets folder ---"
          test -d ./assets && echo "OK: assets/ exists" || (echo "FAIL: assets/ missing" && exit 1)

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
