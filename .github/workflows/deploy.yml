name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-linux/package-lock.json

      - name: Install dependencies
        working-directory: ./web-linux
        run: npm ci

      - name: Build (GitHub Pages mode)
        working-directory: ./web-linux
        run: npm run deploy

      - name: Verify build output
        run: |
          echo "--- Checking dist/index.html exists ---"
          test -f ./dist/index.html && echo "OK: dist/index.html exists" || (echo "FAIL: dist/index.html missing" && exit 1)
          echo "--- Checking dist/assets folder ---"
          test -d ./dist/assets && echo "OK: dist/assets/ exists" || (echo "FAIL: dist/assets/ missing" && exit 1)
          echo "--- Checking dist/favicon ---"
          test -f ./dist/favicon.svg && echo "OK: dist/favicon.svg exists" || echo "WARN: dist/favicon.svg missing"
          echo "--- Checking dist/manifest ---"
          test -f ./dist/manifest.json && echo "OK: dist/manifest.json exists" || echo "WARN: dist/manifest.json missing"
          echo "--- Checking dist/.nojekyll ---"
          test -f ./dist/.nojekyll && echo "OK: dist/.nojekyll exists" || echo "WARN: dist/.nojekyll missing"
          echo ""
          echo "--- Deployment inventory ---"
          echo "Dist root files:"
          ls -1 ./dist/ | head -30
          echo ""
          echo "Asset files count:"
          ls ./dist/assets 2>/dev/null | wc -l || echo 0

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: vite

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

