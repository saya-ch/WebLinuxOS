name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-linux/package-lock.json

      - name: Install dependencies
        working-directory: ./web-linux
        run: npm ci

      - name: Build (GitHub Pages mode)
        working-directory: ./web-linux
        run: npm run deploy

      - name: Move build output to root
        run: |
          # vite.config.ts 中 outDir = '../dist'，构建产物位于仓库根目录的 dist/ 子目录
          if [ -d ./dist ]; then
            cp -r ./dist/* ./
            cp -r ./dist/.nojekyll ./ 2>/dev/null || true
          fi
          touch ./.nojekyll
          if [ ! -f ./404.html ] && [ -f ./index.html ]; then
            cp ./index.html ./404.html
          fi
          echo ""
          echo "--- Deployment inventory ---"
          echo "Root files:"
          ls -1 ./ | head -30
          echo ""
          echo "Asset files count:"
          ls ./assets 2>/dev/null | wc -l || echo 0

      - name: Verify build output
        run: |
          echo "--- Checking index.html exists ---"
          test -f ./index.html && echo "OK: index.html exists" || (echo "FAIL: index.html missing" && exit 1)
          echo "--- Checking assets folder ---"
          test -d ./assets && echo "OK: assets/ exists" || (echo "FAIL: assets/ missing" && exit 1)
          echo "--- Checking favicon ---"
          test -f ./favicon.svg && echo "OK: favicon.svg exists" || echo "WARN: favicon missing"
          echo "--- Checking manifest ---"
          test -f ./manifest.json && echo "OK: manifest.json exists" || echo "WARN: manifest.json missing"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

