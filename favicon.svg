<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#grad1)"/>
  
  <!-- 核心设计 - 简洁的终端窗口 -->
  <g transform="translate(24, 36)">
    <!-- 窗口边框 -->
    <rect x="0" y="0" width="80" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    
    <!-- 窗口控制按钮 -->
    <circle cx="12" cy="12" r="4" fill="#ef4444"/>
    <circle cx="26" cy="12" r="4" fill="#f59e0b"/>
    <circle cx="40" cy="12" r="4" fill="#22c55e"/>
    
    <!-- 终端内容 - 简洁的提示符 -->
    <text x="12" y="38" font-family="monospace" font-size="12" fill="#94a3b8">~$</text>
    <text x="32" y="38" font-family="monospace" font-size="12" fill="#60a5fa">web</text>
    
    <!-- 光标 -->
    <rect x="56" y="28" width="8" height="14" fill="url(#grad2)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>